  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #F8FAFC;
      font-family: "DM Sans", system-ui, sans-serif;
    }

    .boot-loader {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F8FAFC;
      color: #0F172A;
      overflow: hidden;
    }

    .boot-loader__inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .boot-loader__stage {
      position: relative;
      width: 190px;
      height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .boot-loader__svg {
      width: 190px;
      height: 190px;
      transform: rotate(-90deg);
    }

    .boot-loader__bg-ring {
      fill: transparent;
      stroke: #E2E8F0;
      stroke-width: 4;
    }

    .boot-loader__progress-ring {
      fill: transparent;
      stroke: #0F172A;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.6s ease-out;
    }

    .boot-loader__center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .boot-loader__percent {
      margin: 0;
      font-family: "Syne", sans-serif;
      font-size: 42px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      color: #0F172A;
    }

    .boot-loader__word {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #0F172A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 18px;
    }

    .boot-loader__status {
      margin-top: 20px;
      font-size: 11px;
      color: #64748B;
      letter-spacing: 0.04em;
      text-align: center;
      min-height: 16px;
      transition: opacity 0.4s ease;
    }

    .boot-spelling {
      display: inline-flex;
      justify-content: center;
      width: 8ch;
      overflow: hidden;
      position: relative;
    }

    .boot-spelling__letter {
      display: inline-block;
      animation: boot-letter-in 0.18s ease-in-out forwards;
    }

    @keyframes boot-letter-in {
      from {
        opacity: 0;
        transform: translateY(3px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .boot-spelling__letter {
        animation: none;
      }

      .boot-loader__progress-ring {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="boot-loader" role="status" aria-live="polite" aria-busy="true">
      <div class="boot-loader__inner">
        <div class="boot-loader__stage">
          <svg class="boot-loader__svg" viewBox="0 0 190 190" aria-hidden="true">
            <circle class="boot-loader__bg-ring" cx="95" cy="95" r="74" />
            <circle id="boot-progress-ring" class="boot-loader__progress-ring" cx="95" cy="95" r="74" />
          </svg>

          <div class="boot-loader__center">
            <p id="boot-percent" class="boot-loader__percent">0%</p>

            <div class="boot-loader__word">
              <span class="boot-spelling" id="boot-spelling">A</span>
            </div>
          </div>
        </div>

        <!-- Status line — updated with real messages from main.tsx events -->
        <p id="boot-status" class="boot-loader__status"></p>
      </div>
    </div>
  </div>

  <!-- ── Boot progress: real events from main.tsx override the crawl timer ── -->
  <script>
    (function () {
      var progress = 0;
      var realMode = false;   // true once main.tsx starts emitting events
      var startedAt = Date.now();

      var percent = document.getElementById("boot-percent");
      var ring = document.getElementById("boot-progress-ring");
      var statusEl = document.getElementById("boot-status");

      var radius = 74;
      var circumference = 2 * Math.PI * radius;
      ring.style.strokeDasharray = circumference;

      function updateRing(value) {
        var clamped = Math.max(0, Math.min(100, value));
        ring.style.strokeDashoffset = circumference - (clamped / 100) * circumference;
        if (percent) percent.textContent = Math.round(clamped) + '%';
      }

      function setStatus(msg) {
        if (statusEl) statusEl.textContent = msg;
      }

      updateRing(0);

      // ── Listen for REAL progress from main.tsx health polling ──────────────
      window.addEventListener('axiom:load-progress', function (e) {
        var pct = typeof e.detail === 'number' ? e.detail : 0;
        realMode = true;
        progress = pct;
        updateRing(pct);

        if (pct < 20) {
          setStatus('Connecting to server\u2026');
        } else if (pct < 50) {
          setStatus('Server is starting up \u2014 this takes ~30s');
        } else if (pct < 88) {
          setStatus('Almost there\u2026');
        } else if (pct < 100) {
          setStatus('Loading your account\u2026');
        } else {
          setStatus('');
        }
      });

      // ── Slow crawl fallback (only runs before real events arrive) ──────────
      // Crawls 0 → 15 % over ~8 s to show the ring is alive, then stalls.
      // Once main.tsx emits its first event, realMode=true and this stops.
      var crawlInterval = setInterval(function () {
        if (realMode) { clearInterval(crawlInterval); return; }

        var elapsed = Date.now() - startedAt;

        // Gentle crawl: reach 15 % after ~8 s, then hold
        var target = Math.min(15, (elapsed / 8000) * 15);
        if (target > progress) {
          progress = target;
          updateRing(progress);
        }

        // After 4 s of silence, hint that we're connecting
        if (elapsed > 4000 && statusEl && !statusEl.textContent) {
          setStatus('Connecting to server\u2026');
        }
      }, 200);
    })();
  </script>

  <!-- ── AXIOM letter-by-letter spelling animation ── -->
  <script>
    (function () {
      var SEQUENCE = ["A", "X", "I", "O", "M", "AXIOM"];

      var LETTER_MS = 500;
      var FULL_MS = 1600;

      var index = 0;

      var slot = document.getElementById("boot-spelling");

      if (!slot) return;

      function render() {
        var span = document.createElement("span");

        span.className = "boot-spelling__letter";
        span.textContent = SEQUENCE[index];

        slot.innerHTML = "";
        slot.appendChild(span);

        setTimeout(function () {
          index = (index + 1) % SEQUENCE.length;
          render();
        }, index === SEQUENCE.length - 1
          ? FULL_MS
          : LETTER_MS);
      }

      render();
    })();
  </script>

  <script type="module" src="/src/main.tsx"></script>

  <!-- ── App-loading state manager (hides boot-loader once React mounts) ── -->
  <script>
    (function () {
      var ready = false;
      var root = document.getElementById("root");

      function findLoader() {
        return (
          document.getElementById("app-loader") ||
          document.getElementById("initial-loader") ||
          document.getElementById("splash-screen") ||
          document.getElementById("loading-screen") ||
          document.querySelector("[data-app-loader]") ||
          document.querySelector("[data-loading-screen]") ||
          document.querySelector(".app-loading") ||
          document.querySelector(".initial-loader") ||
          document.querySelector(".splash-screen") ||
          document.querySelector(".loading-screen") ||
          document.querySelector(".loader")
        );
      }

      function finishLoader() {
        if (ready) return;
        ready = true;
        window.__AXIOM_APP_READY__ = true;

        window.setTimeout(function () {
          var loader = findLoader();
          if (!loader) return;
          loader.style.opacity = "0";
          loader.style.pointerEvents = "none";
          loader.setAttribute("aria-busy", "false");
          window.setTimeout(function () {
            loader.style.display = "none";
            loader.setAttribute("hidden", "");
          }, 350);
        }, 250);
      }

      window.__AXIOM_APP_READY__ = false;
      window.addEventListener("axiom:app-ready", finishLoader);

      if (root) {
        if (root.children.length > 0) finishLoader();

        new MutationObserver(function () {
          if (root.children.length > 0) finishLoader();
        }).observe(root, { childList: true });
      }
    })();
  </script>
</body>
