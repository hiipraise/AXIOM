  <script type="application/ld+json">

    rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #F8FAFC;
      font-family: "DM Sans", system-ui, sans-serif;
    }

    .boot-loader {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F8FAFC;
      color: #0F172A;
      overflow: hidden;
    }

    .boot-loader__inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .boot-loader__stage {
      position: relative;
      width: 190px;
      height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .boot-loader__svg {
      width: 190px;
      height: 190px;
      transform: rotate(-90deg);
    }

    .boot-loader__bg-ring {
      fill: transparent;
      stroke: #E2E8F0;
      stroke-width: 4;
    }

    .boot-loader__progress-ring {
      fill: transparent;
      stroke: #0F172A;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.25s ease-out;
    }

    .boot-loader__center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .boot-loader__percent {
      margin: 0;
      font-family: "Syne", sans-serif;
      font-size: 42px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      color: #0F172A;
    }

    .boot-loader__word {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #0F172A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 18px;
    }

    .boot-spelling {
      display: inline-flex;
      justify-content: center;
      width: 8ch;
      overflow: hidden;
      position: relative;
    }

    .boot-spelling__letter {
      display: inline-block;
      animation: boot-letter-in 0.18s ease-in-out forwards;
    }

    @keyframes boot-letter-in {
      from {
        opacity: 0;
        transform: translateY(3px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .boot-spelling__letter {
        animation: none;
      }

      .boot-loader__progress-ring {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="boot-loader" role="status" aria-live="polite" aria-busy="true">
      <div class="boot-loader__inner">
        <div class="boot-loader__stage">
          <svg class="boot-loader__svg" viewBox="0 0 190 190" aria-hidden="true">
            <circle class="boot-loader__bg-ring" cx="95" cy="95" r="74" />

            <circle id="boot-progress-ring" class="boot-loader__progress-ring" cx="95" cy="95" r="74" />
          </svg>

          <div class="boot-loader__center">
            <p id="boot-percent" class="boot-loader__percent">0%</p>

            <div class="boot-loader__word">
              <span class="boot-spelling" id="boot-spelling">A</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var progress = 0;

      var percent = document.getElementById("boot-percent");
      var ring = document.getElementById("boot-progress-ring");

      var radius = 74;
      var circumference = 2 * Math.PI * radius;

      ring.style.strokeDasharray = circumference;

      function updateRing(value) {
        var offset =
          circumference - (value / 100) * circumference;

        ring.style.strokeDashoffset = offset;
      }

      updateRing(0);

      var interval = setInterval(function () {
        progress += Math.floor(Math.random() * 8) + 2;

        if (progress >= 100) {
          progress = 100;
          clearInterval(interval);
        }

        if (percent) {
          percent.textContent = progress + "%";
        }

        updateRing(progress);
      }, 120);
    })();

    (function () {
      var SEQUENCE = ["A", "X", "I", "O", "M", "AXIOM"];

      var LETTER_MS = 500;
      var FULL_MS = 1600;

      var index = 0;

      var slot = document.getElementById("boot-spelling");

      if (!slot) return;

      function render() {
        var span = document.createElement("span");

        span.className = "boot-spelling__letter";
        span.textContent = SEQUENCE[index];

        slot.innerHTML = "";
        slot.appendChild(span);

        setTimeout(function () {
          index = (index + 1) % SEQUENCE.length;
          render();
        }, index === SEQUENCE.length - 1
          ? FULL_MS
          : LETTER_MS);
      }

      render();
    })();
  </script>

  <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        var ready = false;
        var progress = 8;
        var startedAt = Date.now();
        var root = document.getElementById("root");

        function findLoader() {
          return (
            document.getElementById("app-loader") ||
            document.getElementById("initial-loader") ||
            document.getElementById("splash-screen") ||
            document.getElementById("loading-screen") ||
            document.querySelector("[data-app-loader]") ||
            document.querySelector("[data-loading-screen]") ||
            document.querySelector(".app-loading") ||
            document.querySelector(".initial-loader") ||
            document.querySelector(".splash-screen") ||
            document.querySelector(".loading-screen") ||
            document.querySelector(".loader")
          );
        }

        function findProgress(loader) {
          if (!loader) return null;
          return (
            loader.querySelector("[data-progress-bar]") ||
            loader.querySelector("[data-loader-progress]") ||
            loader.querySelector(".loader-progress") ||
            loader.querySelector(".progress-bar") ||
            loader.querySelector(".loading-progress") ||
            loader.querySelector('[role="progressbar"]')
          );
        }

        function findProgressText(loader) {
          if (!loader) return null;
          return (
            loader.querySelector("[data-progress-text]") ||
            loader.querySelector("[data-loader-percent]") ||
            loader.querySelector(".loader-percent") ||
            loader.querySelector(".progress-text") ||
            loader.querySelector(".loading-percent")
          );
        }

        function setProgress(value) {
          var loader = findLoader();
          var bar = findProgress(loader);
          var text = findProgressText(loader);
          var percent = Math.max(0, Math.min(100, Math.round(value)));

          if (loader && !ready) {
            loader.style.display = loader.dataset.axiomDisplay || "flex";
            loader.style.opacity = "1";
            loader.style.pointerEvents = "auto";
            loader.classList.remove("hidden", "loaded", "complete", "is-hidden");
            loader.removeAttribute("hidden");
            loader.setAttribute("aria-busy", "true");
          }

          if (bar) {
            bar.style.width = percent + "%";
            bar.setAttribute("aria-valuenow", String(percent));
          }

          if (text) {
            text.textContent = percent + "%";
          }
        }

        function finishLoader() {
          if (ready) return;
          ready = true;
          window.__AXIOM_APP_READY__ = true;
          setProgress(100);

          window.setTimeout(function () {
            var loader = findLoader();
            if (!loader) return;
            loader.style.opacity = "0";
            loader.style.pointerEvents = "none";
            loader.setAttribute("aria-busy", "false");
            window.setTimeout(function () {
              loader.style.display = "none";
              loader.setAttribute("hidden", "");
            }, 350);
          }, 250);
        }

        window.__AXIOM_APP_READY__ = false;
        window.addEventListener("axiom:app-ready", finishLoader);

        if (root) {
          if (root.children.length > 0) finishLoader();

          new MutationObserver(function () {
            if (root.children.length > 0) finishLoader();
          }).observe(root, { childList: true });
        }

        window.setInterval(function () {
          if (ready) return;
          var elapsed = Date.now() - startedAt;
          var cap = elapsed > 12000 ? 92 : elapsed > 6000 ? 88 : 82;
          progress += Math.max(0.25, (cap - progress) * 0.035);
          progress = Math.min(progress, cap);
          setProgress(progress);
        }, 250);
      })();
    </script>
  </body>

</html>
