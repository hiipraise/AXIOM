  <style>
    .boot-loader {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      color: #0f172a;
      font-family: "DM Sans", system-ui, sans-serif;
    }

    .boot-loader__card {
      width: min(360px, calc(100% - 48px));
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 1px 8px rgba(15, 23, 42, 0.08);
    }

    .boot-loader__title {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45ch;
    }

    .boot-loader__desc {
      margin: 6px 0 0;
      font-size: 14px;
      color: #475569;
    }

    /* Spelling word slot */
    .boot-spelling {
      display: inline-flex;
      justify-content: center;
      width: 5ch;
      overflow: hidden;
      position: relative;
    }

    .boot-spelling__letter {
      display: inline-block;
      animation: boot-letter-in 0.18s ease-in-out forwards;
    }

    @keyframes boot-letter-in {
      from {
        opacity: 0;
        transform: translateY(3px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .boot-spelling__letter--out {
      animation: boot-letter-out 0.18s ease-in-out forwards;
    }

    @keyframes boot-letter-out {
      from {
        opacity: 1;
        transform: translateY(0);
      }

      to {
        opacity: 0;
        transform: translateY(-3px);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="boot-loader" role="status" aria-live="polite" aria-busy="true">
      <!-- The Bouncing Favicon -->
      <img id="dvd-bouncer" src="/favicon.ico" style="position: absolute; width: 48px; height: 48px; z-index: 10;" />

      <div class="boot-loader__card" style="position: relative; z-index: 1;">
        <p class="boot-loader__title">
          <span class="boot-spelling"><span class="boot-spelling__letter">A</span></span>
          <span>is loading…</span>
        </p>
        <p class="boot-loader__desc">Starting AXIOM CV. Thanks for hanging tight.</p>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const img = document.getElementById('dvd-bouncer');
      let x = Math.random() * (window.innerWidth - 48);
      let y = Math.random() * (window.innerHeight - 48);
      let xSpeed = 2; // Adjust for speed
      let ySpeed = 2;

      function animate() {
        if (!img) return;
        const screenWidth = window.innerWidth - img.clientWidth;
        const screenHeight = window.innerHeight - img.clientHeight;

        x += xSpeed;
        y += ySpeed;

        if (x >= screenWidth || x <= 0) xSpeed *= -1;
        if (y >= screenHeight || y <= 0) ySpeed *= -1;

        img.style.left = x + 'px';
        img.style.top = y + 'px';

        requestAnimationFrame(animate);
      }
      animate();
    })();

    (function () {
      var SEQUENCE = ['A', 'X', 'I', 'O', 'M', 'AXIOM'];
      var LETTER_MS = 500;
      var FULL_MS = 1600;
      var index = 0;
      var slot = document.querySelector('.boot-spelling');
      if (!slot) return;
      function render() {
        var span = document.createElement('span');
        span.className = 'boot-spelling__letter';
        span.textContent = SEQUENCE[index];
        slot.innerHTML = '';
        slot.appendChild(span);
        setTimeout(function () {
          index = (index + 1) % SEQUENCE.length;
          render();
        }, index === SEQUENCE.length - 1 ? FULL_MS : LETTER_MS);
      }
      render();
    })();
  </script>

  <script type="module" src="/src/main.tsx"></script>
</body>
